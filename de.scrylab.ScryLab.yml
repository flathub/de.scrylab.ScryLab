app-id: de.scrylab.ScryLab

tags:
  - proprietary

runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

command: ScryLab

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents

modules:
  - name: scrylab
    buildsystem: simple
    build-commands:
      - install -Dm755 scrylab-wrapper.sh /app/bin/ScryLab
      - mkdir -p /app/lib
      - cp -a ScryLab.dist /app/lib/ScryLab.dist
      - install -Dm644 de.scrylab.ScryLab.desktop /app/share/applications/de.scrylab.ScryLab.desktop
      - install -Dm644 de.scrylab.ScryLab.metainfo.xml /app/share/metainfo/de.scrylab.ScryLab.metainfo.xml
      - install -Dm644 de.scrylab.ScryLab.xml /app/share/mime/packages/de.scrylab.ScryLab.xml
      - install -Dm644 de.scrylab.ScryLab.svg /app/share/icons/hicolor/scalable/apps/de.scrylab.ScryLab.svg
      - install -Dm644 LICENSE /app/share/licenses/de.scrylab.ScryLab/LICENSE

    sources:
      - type: archive
        url: https://releases.scrylab.de/linux/ScryLab-0.2.1-linux-x86_64.tar.gz
        sha256: 7337cdb7e8b3766c2bfca54232d804701c4ea419f09d3c558224ce6b359dcca0
      - type: file
        path: scrylab-wrapper.sh
