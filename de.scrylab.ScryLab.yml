app-id: de.scrylab.ScryLab

runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

command: ScryLab

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --filesystem=home

modules:
  - name: scrylab
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 scrylab-wrapper.sh /app/bin/ScryLab
      - install -Dm644 de.scrylab.ScryLab.desktop /app/share/applications/de.scrylab.ScryLab.desktop
      - install -Dm644 de.scrylab.ScryLab.metainfo.xml /app/share/metainfo/de.scrylab.ScryLab.metainfo.xml
      - install -Dm644 de.scrylab.ScryLab.xml /app/share/mime/packages/de.scrylab.ScryLab.xml
      - install -Dm644 de.scrylab.ScryLab.svg /app/share/icons/hicolor/scalable/apps/de.scrylab.ScryLab.svg
      - install -Dm644 LICENSE /app/share/licenses/de.scrylab.ScryLab/LICENSE

    sources:
      - type: extra-data
        filename: scrylab.tar.gz
        only-arches:
          - x86_64
        url: https://releases.scrylab.de/linux/ScryLab-0.1.7-linux-x86_64.tar.gz
        sha256: 9cbe2edbd107a85e4711499cdda02548aeec2bd4510a2cd6602f479fe9f5e047
        size: 240944318

      - type: file
        path: apply_extra.sh
      - type: file
        path: scrylab-wrapper.sh
      - type: file
        path: de.scrylab.ScryLab.desktop
      - type: file
        path: de.scrylab.ScryLab.metainfo.xml
      - type: file
        path: de.scrylab.ScryLab.xml
      - type: file
        path: de.scrylab.ScryLab.svg
      - type: file
        path: LICENSE
